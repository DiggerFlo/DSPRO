# NZZ ContextAI — Baseline Configuration
# Adjust values here instead of modifying source code.
# Override individual values via environment variables in .env.

pipeline:
  name: nzz-contextai
  version: "0.1.0"

data:
  raw_dir: data/raw
  processed_dir: data/processed
  chunks_dir: data/chunks
  embeddings_dir: data/embeddings
  article_date_range:
    start: 2000
    end: 2026

chunking:
  strategy: fixed          # options: fixed, semantic
  chunk_size: 512
  overlap: 64
  preserve_metadata: true

embedding:
  model: sentence-transformers/paraphrase-multilingual-mpnet-base-v2
  dimension: 768
  batch_size: 64

vector_store:
  backend: chromadb        # options: chromadb, faiss
  collection: nzz_articles
  path: data/embeddings/chroma_db

retrieval:
  top_k: 5
  similarity_metric: cosine

generation:
  provider: local          # options: local, openai
  model: llama3            # or gpt-4o-mini for OpenAI
  max_tokens: 512
  temperature: 0.2
  prompt_version: v1

evaluation:
  metrics:
    - precision_at_k
    - relevance_score
    - hallucination_rate
  test_query_set: docs/reports/test_queries.json

mlflow:
  tracking_uri: experiments/mlflow
  experiment_name: nzz-contextai
